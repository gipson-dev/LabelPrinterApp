name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package-windows:
    name: Package Windows EXE
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          arch: win64_msvc2022_64

      - name: Package release
        shell: pwsh
        run: |
          .\scripts\package-release.ps1 -Config Release

      - name: Create ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path dist\LabelPrinterApp\* -DestinationPath dist\LabelPrinterApp-windows-x64.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LabelPrinterApp-windows-x64
          path: dist/LabelPrinterApp-windows-x64.zip

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${env:GITHUB_REF_NAME}" "dist\LabelPrinterApp-windows-x64.zip" --generate-notes --title "${env:GITHUB_REF_NAME}"
